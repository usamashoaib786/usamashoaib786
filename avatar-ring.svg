<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <defs>
    <clipPath id="circleClip">
      <circle cx="110" cy="110" r="88"/>
    </clipPath>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Rotating gradient ring -->
  <circle cx="110" cy="110" r="100" fill="none" stroke="url(#ringGradient)"
          stroke-width="6" stroke-linecap="round" stroke-dasharray="440 190">
    <animateTransform attributeName="transform" type="rotate"
                       from="0 110 110" to="360 110 110"
                       dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Soft outer glow ring, counter-rotating -->
  <circle cx="110" cy="110" r="106" fill="none" stroke="#22D3EE" opacity="0.35"
          stroke-width="2" stroke-dasharray="30 40">
    <animateTransform attributeName="transform" type="rotate"
                       from="360 110 110" to="0 110 110"
                       dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Avatar photo, clipped to circle -->
  <image href="https://avatars.githubusercontent.com/u/159139228?v=4"
         x="20" y="20" width="180" height="180" clip-path="url(#circleClip)"/>
</svg>
